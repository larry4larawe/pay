name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build webpack
        run: npx webpack --config webpack.config.js --mode production

      - name: Build Windows installer (NSIS + MSI)
        run: npx electron-builder --win --x64 --publish=never

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: TAD-Pay-Setup
          path: dist/TAD Pay Setup *.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: TAD-Pay-MSI
          path: dist/TAD Pay *.msi

  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build webpack
        run: npx webpack --config webpack.config.js --mode production

      - name: Build macOS app (DMG + ZIP, Apple Silicon)
        # Signature ad-hoc (identity "-" dans package.json) : pas de certificat
        # Apple Developer requis, mais l'app a une signature valide pour pouvoir
        # démarrer sur Apple Silicon. L'utilisateur devra retirer la quarantaine
        # au premier lancement (xattr -dr com.apple.quarantine).
        run: npx electron-builder --mac --arm64 --publish=never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: TAD-Pay-macOS-DMG
          path: dist/*.dmg

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: TAD-Pay-macOS-ZIP
          path: dist/*.zip
